<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Worlds2009 Browser</title>
  <style>
    :root {
      --bg: #0f1220;
      --panel: #171b2f;
      --panel-2: #1e2440;
      --text: #f4f7ff;
      --muted: #aab3d1;
      --accent: #6ea8fe;
      --accent-2: #8ef0c7;
      --border: rgba(255,255,255,0.10);
      --shadow: 0 12px 35px rgba(0,0,0,0.28);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: radial-gradient(circle at top, #1a2140 0%, var(--bg) 45%, #090b14 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .app {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }

    .header {
      background: rgba(23, 27, 47, 0.9);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 22px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }

    .title-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      letter-spacing: 0.2px;
    }

    .subtitle {
      margin-top: 8px;
      color: var(--muted);
      line-height: 1.5;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 12px;
      margin-top: 18px;
    }

    input[type="search"] {
      width: 100%;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid var(--border);
      outline: none;
      background: var(--panel-2);
      color: var(--text);
      font-size: 15px;
    }

    input[type="search"]::placeholder { color: #9ca6c8; }

    .btn {
      border: 0;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      color: #08111f;
      background: linear-gradient(135deg, var(--accent), #a8c8ff);
      box-shadow: 0 10px 20px rgba(110,168,254,0.25);
      transition: transform 0.15s ease, opacity 0.15s ease;
      white-space: nowrap;
    }

    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: translateY(1px); }

    .btn.secondary {
      background: linear-gradient(135deg, #1ce0a8, var(--accent-2));
      box-shadow: 0 10px 20px rgba(30,224,168,0.18);
    }

    .status {
      margin-top: 14px;
      color: var(--muted);
      font-size: 14px;
    }

    .list {
      margin-top: 22px;
      display: grid;
      gap: 14px;
    }

    .card {
      display: grid;
      grid-template-columns: 72px 1fr auto;
      gap: 16px;
      align-items: center;
      background: rgba(23, 27, 47, 0.95);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
    }

    .icon {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      object-fit: cover;
      background: #2a3153;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .meta {
      min-width: 0;
    }

    .name {
      font-size: 18px;
      font-weight: 700;
      margin: 0 0 6px;
      word-break: break-word;
    }

    .details {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
      word-break: break-word;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: stretch;
    }

    .download-link {
      display: inline-block;
      text-decoration: none;
      text-align: center;
      padding: 12px 15px;
      border-radius: 12px;
      background: linear-gradient(135deg, #ffffff, #dfe8ff);
      color: #111827;
      font-weight: 700;
      min-width: 140px;
    }

    .download-link:hover { opacity: 0.95; }

    .empty {
      text-align: center;
      padding: 54px 18px;
      color: var(--muted);
      border: 1px dashed rgba(255,255,255,0.16);
      border-radius: 20px;
      background: rgba(23,27,47,0.5);
    }

    .small {
      font-size: 12px;
      color: #8f9abd;
    }

    @media (max-width: 760px) {
      .controls {
        grid-template-columns: 1fr;
      }

      .card {
        grid-template-columns: 64px 1fr;
      }

      .actions {
        grid-column: 1 / -1;
        flex-direction: row;
      }

      .download-link { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="title-row">
        <div>
          <h1>Worlds2009 Browser</h1>
          <div class="subtitle">Choose the <b>Worlds2009</b> folder, and this page will scan every <code>.mcworld</code> file, read its world name from <code>levelname.txt</code>, and let users search and download them.</div>
        </div>
      </div>

      <div class="controls">
        <input id="search" type="search" placeholder="Search world name, file name, or characters..." disabled />
        <button id="pickFolder" class="btn">Choose Worlds2009 Folder</button>
        <button id="refresh" class="btn secondary" disabled>Refresh</button>
      </div>

      <div id="status" class="status">No folder selected yet.</div>
    </div>

    <div id="list" class="list"></div>
  </div>

  <input id="folderInput" type="file" webkitdirectory directory multiple hidden />

  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script>
    const folderInput = document.getElementById('folderInput');
    const pickFolderBtn = document.getElementById('pickFolder');
    const refreshBtn = document.getElementById('refresh');
    const searchInput = document.getElementById('search');
    const statusEl = document.getElementById('status');
    const listEl = document.getElementById('list');

    let allWorlds = [];
    let folderFiles = [];
    let currentQuery = '';

    pickFolderBtn.addEventListener('click', () => folderInput.click());
    refreshBtn.addEventListener('click', () => loadWorlds(folderFiles));

    searchInput.addEventListener('input', () => {
      currentQuery = searchInput.value.trim().toLowerCase();
      renderList();
    });

    folderInput.addEventListener('change', async (e) => {
      folderFiles = Array.from(e.target.files || []);
      await loadWorlds(folderFiles);
    });

    function formatBytes(bytes) {
      if (!Number.isFinite(bytes)) return 'Unknown size';
      const units = ['B', 'KB', 'MB', 'GB'];
      let size = bytes;
      let unit = 0;
      while (size >= 1024 && unit < units.length - 1) {
        size /= 1024;
        unit++;
      }
      return `${size.toFixed(size < 10 && unit > 0 ? 1 : 0)} ${units[unit]}`;
    }

    function isMcWorld(file) {
      return file.name.toLowerCase().endsWith('.mcworld');
    }

    async function loadWorlds(files) {
      allWorlds = [];
      listEl.innerHTML = '<div class="empty">Scanning files...</div>';
      searchInput.disabled = true;
      refreshBtn.disabled = true;

      const mcworldFiles = files.filter(isMcWorld);
      if (!mcworldFiles.length) {
        listEl.innerHTML = '<div class="empty">No .mcworld files found in the selected folder.</div>';
        statusEl.textContent = 'No .mcworld files found.';
        return;
      }

      statusEl.textContent = `Found ${mcworldFiles.length} .mcworld file(s). Reading world names...`;

      const results = [];
      for (let i = 0; i < mcworldFiles.length; i++) {
        const file = mcworldFiles[i];
        try {
          const levelName = await getLevelName(file);
          const iconUrl = await getWorldIcon(file);
          results.push({
            file,
            levelName,
            iconUrl,
            sizeText: formatBytes(file.size),
            searchText: `${file.name} ${levelName}`.toLowerCase(),
          });
        } catch (err) {
          results.push({
            file,
            levelName: file.name.replace(/\.mcworld$/i, ''),
            iconUrl: defaultIcon(),
            sizeText: formatBytes(file.size),
            searchText: file.name.toLowerCase(),
            error: true,
          });
        }
        statusEl.textContent = `Reading world names... ${i + 1}/${mcworldFiles.length}`;
      }

      allWorlds = results;
      searchInput.disabled = false;
      refreshBtn.disabled = false;
      statusEl.textContent = `Loaded ${allWorlds.length} world(s).`;
      renderList();
    }

    async function getLevelName(file) {
      const zip = await JSZip.loadAsync(await file.arrayBuffer());
      const levelFile = zip.file(/(^|\/)levelname\.txt$/i)[0];
      if (levelFile) {
        const text = (await levelFile.async('string')).trim();
        if (text) return text;
      }
      return file.name.replace(/\.mcworld$/i, '');
    }

    async function getWorldIcon(file) {
      try {
        const zip = await JSZip.loadAsync(await file.arrayBuffer());
const icon = zip.file(/(^|\/)world_icon\.(png|jpe?g)$/i)[0] || zip.file(/(^|\/)levelicon\.(png|jpe?g)$/i)[0];
        if (!icon) return defaultIcon();
        const blob = await icon.async('blob');
        return URL.createObjectURL(blob);
      } catch {
        return defaultIcon();
      }
    }

    function defaultIcon() {
      return 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(`
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
          <rect width="128" height="128" rx="24" fill="#26304f"/>
          <rect x="18" y="18" width="92" height="92" rx="18" fill="#36456d"/>
          <path d="M32 85l16-20 14 16 11-13 23 17v10H32z" fill="#8ef0c7"/>
          <circle cx="49" cy="49" r="10" fill="#ffd36e"/>
        </svg>
      `);
    }

    function renderList() {
      const worlds = allWorlds.filter(w => {
        if (!currentQuery) return true;
        return w.searchText.includes(currentQuery);
      });

      if (!worlds.length) {
        listEl.innerHTML = '<div class="empty">No worlds match your search.</div>';
        return;
      }

      listEl.innerHTML = worlds.map((world, index) => {
        const safeName = escapeHtml(world.levelName);
        const safeFile = escapeHtml(world.file.name);
        const note = world.error ? '<div class="small">Read with fallback name because levelname.txt could not be loaded.</div>' : '';
        return `
          <div class="card">
            <img class="icon" src="${world.iconUrl}" alt="World icon" />
            <div class="meta">
              <div class="name">${safeName}</div>
              <div class="details">
                File: ${safeFile}<br />
                Size: ${world.sizeText}
              </div>
              ${note}
            </div>
            <div class="actions">
              <a class="download-link" href="#" data-index="${allWorlds.indexOf(world)}">Download</a>
            </div>
          </div>
        `;
      }).join('');

      listEl.querySelectorAll('.download-link').forEach(link => {
        link.addEventListener('click', async (e) => {
          e.preventDefault();
          const idx = Number(link.dataset.index);
          const world = allWorlds[idx];
          if (!world) return;
          await downloadFile(world.file);
        });
      });
    }

    async function downloadFile(file) {
      const blob = file.slice(0, file.size, file.type || 'application/octet-stream');
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = file.name;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1500);
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }
  </script>
</body>
</html>
